sudo: required
services:
  - docker

before_install:
  - docker pull node:8-onbuild

install:
  - docker build -t probot .

script:
  - docker run --rm probot npm run test
  - docker run --rm probot npm run lint

deploy:
  provider: heroku
  api_key:
    secure: 
  on: heroku_production
  app: probot-aleksft
